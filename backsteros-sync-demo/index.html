<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BacksterOS Sync Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 2rem auto;
        max-width: 720px;
        line-height: 1.5;
      }
      button,
      input {
        font: inherit;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin: 0.75rem 0;
      }
      ul {
        padding-left: 1.25rem;
      }
      .status {
        padding: 0.75rem 1rem;
        border-radius: 8px;
        background: color-mix(in srgb, CanvasText 8%, Canvas);
        margin-bottom: 1rem;
      }
      .error {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <h1>BacksterOS PowerSync Demo</h1>
    <p>Phase 3 web client — offline task list synced via PowerSync.</p>
    <div id="status" class="status">Starting…</div>
    <div class="row">
      <input id="title" placeholder="New task title" style="flex: 1" />
      <button id="add">Add task</button>
    </div>
    <ul id="tasks"></ul>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

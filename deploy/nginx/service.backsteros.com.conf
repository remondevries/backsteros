# nginx site for service.backsteros.com
# Kamal proxy listens on 127.0.0.1:8082 (same as staging.backsteros.com).
#
# Install:
#   sudo cp deploy/nginx/service.backsteros.com.conf /etc/nginx/sites-available/service-backsteros
#   sudo ln -sf /etc/nginx/sites-available/service-backsteros /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d service.backsteros.com

server {
    listen 80;
    listen [::]:80;
    server_name service.backsteros.com;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 100M;
    }
}

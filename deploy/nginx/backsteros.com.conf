# Apex product host — https://backsteros.com/app
#
# Kamal still routes the Next container by internal Host app.backsteros.com
# on 127.0.0.1:8082. That hostname is not the public URL.
#
# Install:
#   sudo cp deploy/nginx/backsteros.com.conf /etc/nginx/sites-available/backsteros-com
#   sudo ln -sf /etc/nginx/sites-available/backsteros-com /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d backsteros.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Note: www.backsteros.com has no DNS today — do not add it to certbot until it does.

server {
    listen 80;
    listen [::]:80;
    server_name backsteros.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backsteros.com;

    ssl_certificate /etc/letsencrypt/live/backsteros.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backsteros.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /app {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host backsteros.com;
        proxy_set_header X-Forwarded-Host backsteros.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 100M;
    }

    location = / {
        return 302 /app;
    }

    location / {
        return 302 /app;
    }
}

# Legacy subdomain → public product URL at https://backsteros.com/app
# (optional; only if DNS for app.backsteros.com still exists)
#
#   sudo cp deploy/nginx/app.backsteros.com.conf /etc/nginx/sites-available/app-backsteros
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.backsteros.com;
    return 301 https://backsteros.com/app$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.backsteros.com;

    ssl_certificate /etc/letsencrypt/live/app.backsteros.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.backsteros.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://backsteros.com/app$request_uri;
}

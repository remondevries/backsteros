# Install only after the Kamal app reports healthy on the shared proxy:
#   curl -fsS -H 'Host: app.backsteros.com' http://127.0.0.1:8082/api/health
#   sudo cp /etc/nginx/sites-available/app-backsteros{,.bak-$(date +%Y%m%d%H%M%S)}
#   sudo cp deploy/nginx/app.backsteros.com.conf /etc/nginx/sites-available/app-backsteros
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.backsteros.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.backsteros.com;

    ssl_certificate /etc/letsencrypt/live/app.backsteros.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.backsteros.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 100M;
    }
}

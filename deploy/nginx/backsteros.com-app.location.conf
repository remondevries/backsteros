# Include inside the TLS server block for backsteros.com (marketing + /app).
# Prefer the full site file: deploy/nginx/backsteros.com.conf
#
# After deploy:
#   curl -fsS -H 'Host: backsteros.com' http://127.0.0.1:8082/app/api/health
#   curl -fsS https://backsteros.com/app/api/health

location /app {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host backsteros.com;
    proxy_set_header X-Forwarded-Host backsteros.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100M;
}

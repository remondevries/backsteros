# Include inside the TLS server block for backsteros.com (marketing + /app).
# Kamal routes the Next container by Host: app.backsteros.com on :8082.
#
# After deploy:
#   curl -fsS -H 'Host: app.backsteros.com' http://127.0.0.1:8082/app/api/health
#   curl -fsS https://backsteros.com/app/api/health
#
# Example:
#   include /etc/nginx/snippets/backsteros.com-app.location.conf;
# or paste the location block below into sites-available/backsteros.com.

location /app {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host app.backsteros.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 100M;
}

# PowerSync sync streams — Tier A/B metadata for BacksterOS.
# Replicates projects, tasks, and document indexes (not bodies).

config:
  edition: 3

streams:
  workspace:
    auto_subscribe: true
    queries:
      - SELECT id, key, name, summary, description, organization_id, area_id, area, start_date, due_date, icon, color, status, priority, sort_order, created_at, updated_at, deleted_at FROM projects WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, project_id, contact_id, assignee_id, number, title, description, status, priority, sort_order, due_date, triaged_at, inbox, completed_at, created_at, updated_at, deleted_at FROM tasks WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, type, project_id, parent_id, kind, icon, sort_order, journal_date, path, title, storage_key, content_type, byte_size, checksum, snippet, content_version, content_etag, created_at, updated_at, deleted_at FROM documents WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, number, key, name, summary, phone, email, website, address, city, postal_code, country, avatar_storage_key, avatar_content_type, sort_order, notes, created_at, updated_at, deleted_at FROM organizations WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, number, key, organization_id, name, email, title, summary, avatar_storage_key, avatar_content_type, sort_order, phone, role, notes, address, city, postal_code, country, social_accounts, created_at, updated_at, deleted_at FROM contacts WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, name, icon, color, sort_order, created_at, updated_at, deleted_at FROM areas WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, number, project_id, organization_id, contact_id, title, icon, context, status, due_date, received_date, direction, storage_key, original_filename, content_type, byte_size, checksum, content_etag, sort_order, created_at, updated_at, deleted_at FROM letters WHERE workspace_id = auth.parameter('workspace_id') AND deleted_at IS NULL
      - SELECT id, entity_type, entity_id, content_type, byte_size, checksum, content_etag, created_at, updated_at FROM avatars WHERE workspace_id = auth.parameter('workspace_id')
      - SELECT id, user_id, source_type, source_id, excerpt, read_at, created_at FROM mentions WHERE workspace_id = auth.parameter('workspace_id')
      - SELECT workspace_id AS id, settings, updated_at FROM workspace_settings WHERE workspace_id = auth.parameter('workspace_id')

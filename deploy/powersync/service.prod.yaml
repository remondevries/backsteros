# Production PowerSync service — Neon source DB + Mongo bucket storage on 161.35.86.25.
# Env vars passed to container must use PS_ prefix: PS_DATA_SOURCE_URI, PS_JWT_K
replication:
  connections:
    - type: postgresql
      uri: !env PS_DATA_SOURCE_URI
      sslmode: verify-full

storage:
  type: mongodb
  uri: mongodb://backsteros-powersync-mongo:27017/powersync_storage

sync_config:
  path: /config/sync-config.yaml

client_auth:
  audience: ["backsteros-powersync", "https://sync.backsteros.com"]
  jwks:
    keys:
      - kty: oct
        alg: HS256
        kid: backsteros-powersync-1
        k: !env PS_JWT_K

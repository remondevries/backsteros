# Production PowerSync service — Neon source DB + Mongo bucket storage on 161.35.86.25.
# Set POWERSYNC_SOURCE_URI and POWERSYNC_JWT_K in .env before deploy.
replication:
  connections:
    - type: postgresql
      uri: !env POWERSYNC_SOURCE_URI
      sslmode: verify-full

storage:
  type: mongodb
  uri: mongodb://127.0.0.1:27017/powersync_storage

sync_config:
  path: /config/sync-config.yaml

client_auth:
  audience: ["backsteros-powersync", "https://sync.backsteros.com"]
  jwks:
    keys:
      - kty: oct
        alg: HS256
        kid: backsteros-powersync-1
        k: !env POWERSYNC_JWT_K

services:
  postgres:
    image: postgres:17-alpine
    container_name: backsteros-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: backsteros
      POSTGRES_PASSWORD: backsteros
      POSTGRES_DB: backsteros
    volumes:
      - backsteros_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backsteros -d backsteros"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backsteros_pg_data:

packages:
  - backsteros-api
  - backsteros-app
  - backsteros-admin
  - backsteros-desktop
  - backsteros-mobile
  - backsteros-sync-demo
  - backsteros-packages/*
allowBuilds:
  '@clerk/shared': true
  '@journeyapps/wa-sqlite': true
  '@swc/core': true
  browser-tabs-lock: true
  bufferutil: true
  core-js: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
# Single React for Expo mobile (SDK 54) — clerk can otherwise pull a second React.
overrides:
  react: 19.1.0
  react-dom: 19.1.0
  '@types/react': 19.1.10
